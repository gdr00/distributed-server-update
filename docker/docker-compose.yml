volumes:
  server-bin:
  go-module-cache:

services:
  builder:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - server-bin:/output
    command: cp /app/server /output/server

  node1-init:
    image: alpine:latest
    user: "1000:1000"
    command: sh -c "rm -rf /data/crdt && /app/server init --config=/config/cfg.json"
    volumes:
      - server-bin:/app
      - ../tests/testdata/node1:/data
      - ../tests/testdata/node1/config:/config
    depends_on:
      builder:
        condition: service_completed_successfully

  node2-init:
    image: alpine:latest
    user: "1000:1000"
    command: sh -c "rm -rf /data/crdt && /app/server init --empty --config=/config/cfg.json"
    volumes:
      - server-bin:/app
      - ../tests/testdata/node2:/data
      - ../tests/testdata/node2/config:/config
    depends_on:
      builder:
        condition: service_completed_successfully

  node3-init:
    image: alpine:latest
    user: "1000:1000"
    command: sh -c "rm -rf /data/crdt && /app/server init --empty --config=/config/cfg.json"
    volumes:
      - server-bin:/app
      - ../tests/testdata/node3:/data
      - ../tests/testdata/node3/config:/config
    depends_on:
      builder:
        condition: service_completed_successfully

  node1:
    image: alpine:latest
    user: "1000:1000"
    command: /app/server --config=/config/cfg.json
    ports:
      - "9001:9000"
    volumes:
      - server-bin:/app
      - ../tests/testdata/node1:/data
      - ../tests/testdata/node1/config:/config
    depends_on:
      node1-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9000 2>/dev/null"]
      interval: 2s
      timeout: 3s
      retries: 20
      start_period: 3s

  node2:
    image: alpine:latest
    user: "1000:1000"
    command: /app/server --config=/config/cfg.json
    ports:
      - "9002:9000"
    volumes:
      - server-bin:/app
      - ../tests/testdata/node2:/data
      - ../tests/testdata/node2/config:/config
    depends_on:
      node2-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9000 2>/dev/null"]
      interval: 2s
      timeout: 3s
      retries: 20
      start_period: 3s

  node3:
    image: alpine:latest
    user: "1000:1000"
    command: /app/server --config=/config/cfg.json
    ports:
      - "9003:9000"
    volumes:
      - server-bin:/app
      - ../tests/testdata/node3:/data
      - ../tests/testdata/node3/config:/config
    depends_on:
      node3-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9000 2>/dev/null"]
      interval: 2s
      timeout: 3s
      retries: 20
      start_period: 3s

  test-runner:
    image: golang:1.26.2-alpine
    working_dir: /src
    volumes:
      - ../go.mod:/src/go.mod:ro
      - ../go.sum:/src/go.sum:ro
      - ../internal:/src/internal:ro
      - ../tests/system:/src/tests/system:ro
      - go-module-cache:/go/pkg/mod
    environment:
      - NODE1_ADDR=node1:9000
      - NODE2_ADDR=node2:9000
      - NODE3_ADDR=node3:9000
      - GOFLAGS=-mod=mod
    command: go test ./tests/system/... -v -count=1 -timeout 120s
    depends_on:
      node1:
        condition: service_healthy
      node2:
        condition: service_healthy
      node3:
        condition: service_healthy
